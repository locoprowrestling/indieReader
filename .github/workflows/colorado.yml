name: Generate Colorado Post

on:
  schedule:
    - cron: "0 18,19 * * 5"
  workflow_dispatch:
    inputs:
      skip_tweet:
        description: "Skip tweeting after post generation"
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Check Denver noon window
        id: schedule
        run: |
          HOUR="$(TZ=America/Denver date +%H)"
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" || "$HOUR" == "12" ]]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/checkout@v4
        if: steps.schedule.outputs.should_run == 'true'
      - uses: actions/setup-node@v4
        if: steps.schedule.outputs.should_run == 'true'
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
        if: steps.schedule.outputs.should_run == 'true'
      - name: Generate Colorado blog post
        if: steps.schedule.outputs.should_run == 'true'
        run: node scripts/run-generate.js colorado
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL }}
      - name: Commit post
        if: steps.schedule.outputs.should_run == 'true'
        run: |
          git config user.name "indieReader Bot"
          git config user.email "noreply@indiereader"
          git add src/content/posts/
          git diff --staged --quiet || (git commit -m "feat: colorado post $(date -u +%Y-%m-%d)" && git push)
      - name: Tweet new post
        if: steps.schedule.outputs.should_run == 'true' && inputs.skip_tweet != true
        run: |
          if git diff HEAD~1 --name-only | grep src/content/posts; then
            POST_PATH="src/content/posts/$(TZ=America/Denver date +%Y-%m-%d)-colorado.md"
            node scripts/post-tweet.js "$POST_PATH"
          else
            echo "No new post committed — skipping tweet."
          fi
        env:
          TWITTER_CONSUMER_KEY: ${{ secrets.TWITTER_CONSUMER_KEY }}
          TWITTER_SECRET_KEY: ${{ secrets.TWITTER_SECRET_KEY }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_SECRET: ${{ secrets.TWITTER_ACCESS_SECRET }}
          SITE_URL: ${{ vars.SITE_URL }}
